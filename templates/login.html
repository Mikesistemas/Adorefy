{% extends "base.html" %}

{% block content %}
<div id="loginScreen">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-church"></i>
                <h1>ChurchTime</h1>
                <p>Gestão Ministerial Completa</p>
            </div>
            
            <div class="login-tabs">
                <div class="login-tab active" data-tab="login">Entrar</div>
                <div class="login-tab" data-tab="register">Cadastrar</div>
            </div>
            
            <div id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Sua senha">
                </div>
                
                <button class="btn btn-primary btn-block" id="loginBtn">Entrar</button>
            </div>
            
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-input" id="registerName" placeholder="Seu nome completo">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="Crie uma senha">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" class="form-input" id="registerConfirmPassword" placeholder="Confirme sua senha">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Habilidades</label>
                    <textarea class="form-textarea" id="registerSkills" placeholder="Violão, Vocal, Teclado..."></textarea>
                </div>
                
                <button class="btn btn-primary btn-block" id="registerBtn">Cadastrar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
